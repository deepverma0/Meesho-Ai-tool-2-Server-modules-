<!DOCTYPE html>
<html>
<head>
  <title>Buy License</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;padding-top:100px;">
  <div id="app">
  <p id="status">Initializing...</p>
</div>

<h2 id="status">Starting Payment...</h2>

<script><script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

async function start() {
  try {
    document.getElementById("status").innerText = "Creating order...";

    const res = await fetch(API + "/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ plan: "pro" })
    });

    const data = await res.json();

    console.log("ORDER RESPONSE:", data);

    if (!data.success || !data.order) {
      throw new Error("Invalid order response");
    }

    const options = {
      key: "rzp_test_SgARnEVtkbjdvv", // replace with live later
      amount: data.order.amount,
      currency: "INR",
      order_id: data.order.id,

      handler: async function (response) {
        document.getElementById("status").innerText = "Verifying payment...";

        const verify = await fetch(API + "/verify-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            razorpay_order_id: response.razorpay_order_id,
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_signature: response.razorpay_signature,
            plan: data.plan || "pro"
          })
        });

        const result = await verify.json();

        if (result.success) {
          showSuccess(result.key);
        } else {
          document.getElementById("status").innerText = "❌ Verification failed";
        }
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText = "Error: " + e.message;
  }
}

// 🔥 SUCCESS UI (better than replacing whole body)
function showSuccess(key) {
  document.getElementById("app").innerHTML = `
    <div style="text-align:center;padding:40px">
      <h2>🎉 Payment Successful</h2>
      <p>Your License Key:</p>
      <h1 style="color:#ec4899">${key}</h1>

      <button onclick="copyKey('${key}')" 
        style="padding:10px 20px;margin-top:10px;">
        Copy Key
      </button>

      <br><br>

      <a href="/extension.zip" download>
        <button style="padding:10px 20px;background:#111;color:#fff;">
          Download Extension
        </button>
      </a>
    </div>
  `;
}

function copyKey(key) {
  navigator.clipboard.writeText(key);
  alert("Copied!");
}

start();
</script>
</script>

</body>
</html>
