<!DOCTYPE html>
<html>
<head>
  <title>Buy License</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;padding-top:100px;">

<h2 id="status">Starting Payment...</h2>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

async function start() {
  try {
    const res = await fetch(API + "/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ plan: "pro" })
    });

    const data = await res.json();

    // ✅ DEBUG HERE
    console.log("ORDER RESPONSE:", data);

    // 🔥 SAFE HANDLING
    const order = data.order || data;

    if (!order.id || !order.amount) {
      throw new Error("Invalid order data");
    }

    const options = {
      key: "rzp_test_SgARnEVtkbjdvv",
      amount: order.amount,
      currency: "INR",
      order_id: order.id,

      handler: async function (response) {
        document.getElementById("status").innerText = "Verifying...";

        const verify = await fetch(API + "/verify-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ...response,
            plan: data.plan || "pro"
          })
        });

        const result = await verify.json();

        if (result.success) {
          document.body.innerHTML = `
            <h2>Payment Successful ✅</h2>
            <h3>Your License Key:</h3>
            <h1 style="color:#00ffa3">${result.key}</h1>
          `;
        } else {
          document.body.innerHTML = `<h2>Verification Failed ❌</h2>`;
        }
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText = "Error: " + e.message;
  }
}

start();
</script>

</body>
</html>
