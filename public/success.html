<!DOCTYPE html>
<html>
<head>
<title>Success</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#f8fafc;font-family:sans-serif}
.card{background:white;padding:30px;border-radius:16px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
input{padding:10px;margin-top:10px;width:100%;border:1px solid #ccc;border-radius:6px}
.btn{margin-top:10px;padding:10px 20px;border:none;border-radius:8px;background:#111;color:white;cursor:pointer}
.key{margin-top:15px;padding:10px;background:#f1f5f9;font-family:monospace;color:#ec4899}
</style>
</head>

<body>

<div class="card">
  <h2>🎉 Payment Successful</h2>

  <p>Enter your email to get your key:</p>

  <input id="email" placeholder="Enter email used in payment"/>

  <button class="btn" onclick="getKey()">Get My Key</button>

  <div id="key" class="key">Your key will appear here</div>

  <a href="/extension.zip" download>
    <button class="btn">Download Extension</button>
  </a>
</div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

confetti({particleCount:150,spread:80});

async function getKey(){
  const email = document.getElementById("email").value;

  if(!email){
    alert("Enter email");
    return;
  }

  const res = await fetch(API + "/get-key-by-email/" + email);
  const data = await res.json();

  if(data.success){
    document.getElementById("key").innerText = data.key;
  } else {
    document.getElementById("key").innerText = "Key not found. Check email.";
  }
}
</script>

</body>
</html>
