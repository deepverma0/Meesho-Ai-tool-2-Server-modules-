<!DOCTYPE html>
<html>
<head>
<title>Success</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#f8fafc;font-family:sans-serif}
.card{background:white;padding:30px;border-radius:16px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
.key{margin:15px 0;padding:10px;background:#f1f5f9;font-family:monospace;color:#ec4899;font-weight:bold}
</style>
</head>
<body>

<div class="card">
  <h2>🎉 Payment Successful</h2>

  <div id="key" class="key">Fetching your key...</div>

  <button onclick="copyKey()">Copy Key</button>

  <br><br>

  <a href="/extension.zip" download>
    <button style="background:#111;color:#fff;padding:10px 20px;border:none;border-radius:8px">
      Download Extension
    </button>
  </a>

  <br><br>
  <a href="/"><button>Go Back</button></a>
</div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

confetti({particleCount:150,spread:80});

// get payment_id
const params = new URLSearchParams(window.location.search);
const paymentId = params.get("payment_id");

if(paymentId){
  fetchKey();
}else{
  document.getElementById("key").innerText = "Check your email 📧";
}

// fetch key
async function fetchKey(){
  try{
    const res = await fetch(API + "/generate-key-from-payment", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ paymentId })
    });

    const data = await res.json();

    if(data.success){
      document.getElementById("key").innerText = data.key;
    }else{
      document.getElementById("key").innerText = "Sent to email 📧";
    }

  }catch{
    document.getElementById("key").innerText = "Error fetching key";
  }
}

// copy
function copyKey(){
  const key = document.getElementById("key").innerText;
  navigator.clipboard.writeText(key);
  alert("Copied!");
}
</script>

</body>
</html>
