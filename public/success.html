<!DOCTYPE html>
<html>
<head>
<title>Payment Success</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f8fafc;
  font-family:sans-serif;
}

.card{
  background:white;
  padding:30px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.key{
  margin:15px 0;
  padding:12px;
  background:#f1f5f9;
  font-family:monospace;
  color:#ec4899;
  font-weight:bold;
  font-size:16px;
}

.btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

.timer{
  margin-top:10px;
  font-size:13px;
  color:#64748b;
}
</style>
</head>

<body>

<div class="card">
  <h2>🎉 Payment Successful</h2>

  <div id="key" class="key">Generating your key...</div>

  <p id="copy-status" style="font-size:13px;color:#22c55e;"></p>

  <div class="timer" id="timer">Preparing your download...</div>

  <br>

  <button class="btn" onclick="copyKey()">Copy Key</button>

  <br><br>

  <a href="https://drive.google.com/uc?export=download&id=1mQ4T2Sxi4u-0Oa2-AS7FrqcWal_mjYXi">
    <button class="btn">Download Now</button>
  </a>
</div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";
const DOWNLOAD_URL = "https://drive.google.com/uc?export=download&id=1mQ4T2Sxi4u-0Oa2-AS7FrqcWal_mjYXi";

// 🔒 prevent refresh spam
if(sessionStorage.getItem("used")){
  document.body.innerHTML = "<h2 style='text-align:center'>Session expired</h2>";
} else {
  sessionStorage.setItem("used", "true");
}

// 🎉 confetti
confetti({particleCount:150,spread:80});

// 🔥 load key
async function loadKey(){
  try{
    const res = await fetch(API + "/get-temp-key");
    const data = await res.json();

    if(data.success){
      const key = data.key;
      document.getElementById("key").innerText = key;

      // 📋 auto copy
      navigator.clipboard.writeText(key);
      document.getElementById("copy-status").innerText = "✔ Key copied to clipboard";

      startTimer();

    }else{
      document.getElementById("key").innerText = "Error generating key";
    }

  }catch{
    document.getElementById("key").innerText = "Error loading key";
  }
}

// ⏳ countdown + redirect
function startTimer(){
  let seconds = 10;
  const timerEl = document.getElementById("timer");

  const interval = setInterval(() => {
    timerEl.innerText = "Redirecting to download in " + seconds + " seconds...";
    seconds--;

    if(seconds < 0){
      clearInterval(interval);
      window.location.href = DOWNLOAD_URL;
    }
  }, 1000);
}

// manual copy
function copyKey(){
  const key = document.getElementById("key").innerText;
  navigator.clipboard.writeText(key);
  alert("Copied!");
}

loadKey();
</script>

</body>
</html>
