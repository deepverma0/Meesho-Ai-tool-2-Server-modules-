<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

// LOAD PRICE
async function loadPrice(){
  const res = await fetch(API + "/pricing");
  const data = await res.json();
  const p = data.pricing[0];
  document.getElementById("price").innerText =
    "₹" + p.price + " / " + p.days + " days";
}
loadPrice();

// PAYMENT
async function startPayment(){
  const btn = document.getElementById("buyBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  try {
    const res = await fetch(API + "/create-order", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ plan:"pro" })
    });

    const data = await res.json();

    if(!data.success){
      alert("Order failed");
      return;
    }

    const rzp = new Razorpay({
      key:"rzp_live_SgZ144vN2dpARF",
      amount:data.order.amount,
      currency:"INR",
      order_id:data.order.id,

      handler: async function (response) {
        document.getElementById("status").innerText = "Verifying payment...";

        const verify = await fetch(API + "/verify-payment", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            ...response,
            plan:"pro"
          })
        });

        const result = await verify.json();

        if(result.success){
          showSuccess(result.key);
        } else {
          alert("Payment verification failed");
        }
      }
    });

    rzp.open();

  } catch (e) {
    alert("Error: " + e.message);
  }

  btn.disabled = false;
  btn.innerText = "Buy Now";
}

// SUCCESS UI
function showSuccess(key){
  document.getElementById("result").innerHTML = `
    <h3>✅ Payment Successful</h3>
    <div class="key-box" id="key">${key}</div>

    <button class="btn copy-btn" onclick="copyKey()">Copy Key</button>
    <button class="btn download-btn" onclick="downloadExt()">
      Download Extension
    </button>
  `;
}

// COPY KEY
function copyKey(){
  const key = document.getElementById("key").innerText;
  navigator.clipboard.writeText(key);
  alert("Key copied!");
}

// DOWNLOAD
function downloadExt(){
  window.open("https://your-domain.com/extension.zip");
}
</script>
