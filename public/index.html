<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #050509;
  --card: rgba(20,20,30,0.9);
  --primary: #6366f1;
  --gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
  --text: #fff;
  --muted: #aaa;
}

body {
  margin:0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 900px;
  margin: 50px auto;
  padding: 20px;
}

.card {
  background: var(--card);
  padding: 30px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 { margin:0 0 20px; }

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--gradient);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover { opacity: 0.9; }

.stat {
  font-size: 22px;
  margin: 10px 0;
}

#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--gradient);
  padding: 10px 20px;
  border-radius: 10px;
  display:none;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h2>Pricing Control</h2>

<label>Plan</label> <input id="planName" value="pro" readonly>

<label>Price (₹)</label> <input id="planPrice" placeholder="Enter price">

<label>Days</label> <input id="planDays" placeholder="Enter days">

<button onclick="updatePricing()">Update Pricing</button>

</div>

<div class="card">
<h2>Stats</h2>
<div class="stat">Total: <span id="total">0</span></div>
<div class="stat">Active: <span id="active">0</span></div>
<div class="stat">Revenue: ₹<span id="revenue">0</span></div>
</div>

</div>

<div id="toast">Updated</div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";
const ADMIN_KEY = "Plesures@123";

// Toast
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none",2000);
}

// Load pricing
async function loadPricing(){
  const res = await fetch(API + "/admin/pricing", {
    headers: { "x-admin-key": ADMIN_KEY }
  });
  const d = await res.json();
  const p = d.pricing?.[0];

  document.getElementById("planPrice").value = p?.price || "";
  document.getElementById("planDays").value = p?.days || "";
}

// FIXED UPDATE
async function updatePricing(){
  const plan = document.getElementById("planName").value;
  const price = Number(document.getElementById("planPrice").value);
  const days = Number(document.getElementById("planDays").value);

  console.log("UPDATING:", {plan, price, days});

  const res = await fetch(API + "/admin/update-pricing", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ plan, price, days })
  });

  const data = await res.json();
  console.log("RESPONSE:", data);

  if(data.success){
    showToast("Pricing Updated ✅");
    loadPricing();
    loadStats();
  } else {
    alert(data.error);
  }
}

// Stats
async function loadStats(){
  const res = await fetch(API + "/admin/stats", {
    headers: { "x-admin-key": ADMIN_KEY }
  });
  const d = await res.json();

  document.getElementById("total").innerText = d.total;
  document.getElementById("active").innerText = d.active;

  const priceRes = await fetch(API + "/admin/pricing", {
    headers: { "x-admin-key": ADMIN_KEY }
  });
  const priceData = await priceRes.json();

  const price = priceData.pricing?.[0]?.price || 0;
  document.getElementById("revenue").innerText = d.total * price;
}

// INIT
loadPricing();
loadStats();
</script>

</body>
</html>
