<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

// LOAD PRICE
async function loadPrice(){
  try {
    const res = await fetch(API + "/pricing");
    const data = await res.json();

    if(!data.success) throw new Error("Pricing API failed");

    const p = data.pricing.find(i => i.plan === "pro") || data.pricing[0];

    document.getElementById("price").innerHTML =
      `₹${p.price} <span>/ ${p.days} Days</span>`;
  } catch(e) {
    console.error(e);
    document.getElementById("price").innerHTML = "⚠ Unable to load price";
  }
}
loadPrice();


// PAYMENT
async function startPayment(){
  const btn = document.getElementById("buyBtn");
  const status = document.getElementById("status");

  btn.disabled = true;
  btn.innerText = "Connecting...";
  status.innerText = "";

  try {
    const res = await fetch(API + "/create-order", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ plan:"pro" })
    });

    const data = await res.json();

    if(!data.success || !data.order){
      throw new Error("Order creation failed");
    }

    const options = {
      key: data.key || "rzp_test_xxxxxxxx", // 🔒 better: send from backend
      amount: data.order.amount,
      currency: "INR",
      name: "Meesho AI Pro",
      description: "30 Days Access",
      order_id: data.order.id,

      handler: async function (response) {
        status.innerText = "🔄 Verifying payment...";

        try {
          const verify = await fetch(API + "/verify-payment", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature,
              plan:"pro"
            })
          });

          const result = await verify.json();

          if(!result.success){
            throw new Error("Verification failed");
          }

          showSuccess(result.key);

        } catch(err){
          console.error(err);
          status.innerText = "❌ Verification failed";
        }

        btn.disabled = false;
        btn.innerText = "Unlock 30 Days Access";
      },

      modal: {
        ondismiss: function () {
          status.innerText = "⚠ Payment cancelled";
          btn.disabled = false;
          btn.innerText = "Unlock 30 Days Access";
        }
      },

      theme: {
        color: "#6366f1"
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch(e){
    console.error(e);
    status.innerText = "❌ " + e.message;

    btn.disabled = false;
    btn.innerText = "Unlock 30 Days Access";
  }
}


// SUCCESS UI
function showSuccess(key){
  document.getElementById("buyBtn").style.display = "none";
  document.getElementById("status").innerText = "";

  document.getElementById("result").innerHTML = `
    <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px">
      <h4 style="color:#22c55e;">✓ Access Granted</h4>
      
      <div class="key-box" id="key">${key}</div>

      <button class="btn copy-btn" onclick="copyKey()">
        Copy License Key
      </button>

      <button class="btn download-btn" onclick="downloadExt()">
        Download Extension
      </button>
    </div>
  `;
}


// COPY
function copyKey(){
  const key = document.getElementById("key").innerText;
  navigator.clipboard.writeText(key);
  alert("Key copied!");
}


// DOWNLOAD
function downloadExt(){
  // 🔥 Replace with your actual Railway/Vercel hosted file
  window.open(API + "/extension.zip");
}
</script>
