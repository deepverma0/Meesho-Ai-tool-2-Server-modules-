<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meesho AI Tool</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 40px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

img {
  width: 120px;
  margin-bottom: 20px;
}

h1 {
  margin-bottom: 10px;
}

.price {
  font-size: 40px;
  font-weight: bold;
  margin: 20px 0;
}

button {
  background: #ff47be;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#success {
  display: none;
  margin-top: 20px;
}

.key {
  font-size: 22px;
  font-weight: bold;
  margin: 10px 0;
  color: #ff47be;
}

.download {
  display: block;
  margin-top: 15px;
  padding: 12px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/80/Meesho_Logo_Full.png">

<h1>Meesho AI Tool</h1>

<p>Automate product listings, save time, grow faster.</p>

<div class="price">₹<span id="price">...</span></div>

<button onclick="startPayment()">Buy Now</button>

<div id="success">
  <h3>Payment Successful</h3>
  <div class="key" id="generatedKey"></div>
  <a href="/extension.zip" class="download">Download Extension</a>
</div>

<p style="margin-top:20px; font-size:12px;">Developed by Deep Verma</p>

</div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

// Load price
async function loadPrice() {
  const res = await fetch(API + "/pricing?ts=" + Date.now());
  const data = await res.json();
  document.getElementById("price").innerText = data?.[0]?.price || 999;
}

loadPrice();

// Payment
async function startPayment() {
  try {
    const res = await fetch(API + "/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ plan: "pro" })
    });

    const data = await res.json();

    const options = {
      key: "rzp_test_SgARnEVtkbjdvv",
      amount: data.order.amount,
      currency: "INR",
      order_id: data.order.id,

      handler: async function (response) {
        try {
          const verify = await fetch(API + "/verify-payment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              ...response,
              plan: "pro"
            })
          });

          const result = await verify.json();

          if (result.success) {
            document.getElementById("success").style.display = "block";
            document.getElementById("generatedKey").innerText = result.key;
          } else {
            alert(result.error);
          }

        } catch (e) {
          alert("Verification failed");
        }
      }
    };

    new Razorpay(options).open();

  } catch (e) {
    alert("Server error");
  }
}
</script>

</body>
</html>
