<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho AI Pro</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
:root {
  --primary:#6366f1;
  --accent:#ec4899;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}

body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
nav {
  padding:18px 8%;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

.logo {
  font-weight:800;
  font-size:18px;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px 40px;
}

.hero h1 {
  font-size:2.5rem;
  margin-bottom:10px;
}

.hero p {
  color:var(--muted);
  font-size:15px;
}

/* FEATURES */
.features {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:20px;
}

.feature {
  background:var(--card);
  padding:18px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
}

/* CARD */
.buy-section {
  padding:40px 20px;
}

.card {
  max-width:420px;
  margin:auto;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:25px;
  text-align:center;
}

.price {
  font-size:28px;
  margin:15px 0;
}

.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.buy-btn {
  background:linear-gradient(90deg,var(--primary),var(--accent));
  color:white;
}

.copy-btn {
  background:#0f172a;
  color:white;
  margin-top:10px;
}

.download-btn {
  background:#22c55e;
  color:white;
  margin-top:10px;
}

.key-box {
  background:#000;
  color:#22c55e;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  font-family:monospace;
  font-size:14px;
}

.status {
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
}

footer {
  text-align:center;
  padding:30px;
  color:var(--muted);
}
</style>

</head>

<body>

<nav>
  <div class="logo">MEESHO AI</div>
</nav>

<div class="hero">
  <h1>Automate Your Meesho Listings</h1>
  <p>Upload products faster with AI automation</p>
</div>

<div class="features">
  <div class="feature">⚡ Fast Listing</div>
  <div class="feature">🤖 AI Content</div>
  <div class="feature">📦 Bulk Upload</div>
</div>

<div class="buy-section">
  <div class="card">

```
<h3>Pro Plan</h3>
<div id="price" class="price">Loading...</div>

<button id="buyBtn" class="btn buy-btn" onclick="startPayment()">
  Buy Now
</button>

<div id="status" class="status"></div>
<div id="result"></div>
```

  </div>
</div>

<footer>
  © 2026 Meesho AI Tool
</footer>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

async function loadPrice(){
  const res = await fetch(API + "/pricing");
  const data = await res.json();
  const p = data.pricing[0];
  document.getElementById("price").innerText =
    "₹" + p.price + " / " + p.days + " days";
}
loadPrice();

async function startPayment(){
  const btn = document.getElementById("buyBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  try {
    const res = await fetch(API + "/create-order", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ plan:"pro" })
    });

    const data = await res.json();

    const rzp = new Razorpay({
      key:"rzp_live_SgZ144vN2dpARF",
      amount:data.order.amount,
      currency:"INR",
      order_id:data.order.id,

      handler: async function (response) {
        document.getElementById("status").innerText = "Verifying...";

        const verify = await fetch(API + "/verify-payment", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            ...response,
            plan:"pro"
          })
        });

        const result = await verify.json();

        if(result.success){
          showSuccess(result.key);
        }
      }
    });

    rzp.open();

  } catch(e){
    alert("Error: " + e.message);
  }

  btn.disabled = false;
  btn.innerText = "Buy Now";
}

function showSuccess(key){
  document.getElementById("result").innerHTML = `
    <h3>✅ Payment Successful</h3>
    <div class="key-box" id="key">${key}</div>

    <button class="btn copy-btn" onclick="copyKey()">Copy Key</button>
    <button class="btn download-btn" onclick="downloadExt()">Download</button>
  `;
}

function copyKey(){
  navigator.clipboard.writeText(document.getElementById("key").innerText);
  alert("Copied!");
}

function downloadExt(){
  window.open("https://your-domain.com/extension.zip");
}
</script>

</body>
</html>
