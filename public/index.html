<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho AI Pro</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0b0f1a;
  color:white;
}

/* ===== HEADER ===== */
.header {
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-weight:bold;
  font-size:20px;
}

.buy-btn {
  background:#ff4d94;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero {
  text-align:center;
  padding:80px 20px;
}

.hero h1 {
  font-size:3rem;
  background:linear-gradient(90deg,#ff4d94,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {
  color:#94a3b8;
  margin-top:10px;
}

/* ===== FEATURES ===== */
.features {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:40px;
}

.feature {
  background:#111827;
  padding:20px;
  border-radius:15px;
}

/* ===== BUY SECTION ===== */
.buy-section {
  text-align:center;
  padding:60px 20px;
}

.card {
  background:#111827;
  padding:30px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
}

.price {
  font-size:32px;
  margin:20px 0;
}

.btn {
  width:100%;
  padding:15px;
  background:#ff4d94;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.key-box {
  background:black;
  color:#00ffa3;
  padding:15px;
  margin-top:20px;
}

/* ===== FOOTER ===== */
.footer {
  text-align:center;
  padding:30px;
  color:#64748b;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">MEESHO AI</div>
  <div class="buy-btn" onclick="scrollToBuy()">Buy Now</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Automate Your Meesho Listings</h1>
  <p>AI-powered product uploads in seconds</p>
</div>

<!-- FEATURES -->
<div class="features">
  <div class="feature">⚡ One-click listing</div>
  <div class="feature">🤖 AI descriptions</div>
  <div class="feature">📦 Bulk upload</div>
  <div class="feature">📈 Smart pricing</div>
</div>

<!-- BUY -->
<div class="buy-section" id="buy">
  <div class="card">
    <h2>Get Pro Access</h2>
    <div class="price" id="price">Loading...</div>
    <button class="btn" onclick="startPayment()">Buy Now</button>
    <div id="status"></div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Meesho AI Tool
</div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

let orderId = null;

// LOAD PRICE
async function loadPrice(){
  const res = await fetch(API + "/pricing");
  const data = await res.json();
  const p = data.pricing[0];
  document.getElementById("price").innerText =
    "₹" + p.price + " / " + p.days + " days";
}
loadPrice();

// SCROLL
function scrollToBuy(){
  document.getElementById("buy").scrollIntoView({behavior:"smooth"});
}

// PAYMENT
async function startPayment(){
  try {
    const res = await fetch(API + "/create-order", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ plan:"pro" })
    });

    const data = await res.json();

    if(!data.success){
      alert("❌ Order creation failed");
      return;
    }

    const rzp = new Razorpay({
      key:"rzp_test_xxxxx", // 🔥 FIXED
      amount:data.order.amount,
      currency:"INR",
      order_id:data.order.id,

      handler: async function (response) {
        document.getElementById("status").innerHTML = "Verifying payment...";

        const verify = await fetch(API + "/verify-payment", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            ...response,
            plan:"pro"
          })
        });

        const result = await verify.json();

        if(result.success){
          showKey(result.key);
        } else {
          alert("❌ Payment verification failed");
        }
      }
    });

    rzp.open();

  } catch (e) {
    console.error(e);
    alert("⚠ Payment error: " + e.message);
  }
}



// SHOW KEY
function showKey(key){
  document.getElementById("status").innerHTML = `
    <h3>✅ Payment Successful</h3>
    <div class="key-box">${key}</div>
  `;
}
</script>

</body>
</html>
