<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho AI Auto-Listing Tool</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
  :root {
    --primary: #ff4791;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
  }

  h1 {
    font-size: 2.5rem;
    background: linear-gradient(90deg,#ff4791,#ff85b3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .card {
    background: var(--card);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    margin-top: 30px;
  }

  .price {
    font-size: 32px;
    font-weight: bold;
    margin: 20px 0;
  }

  .btn {
    width: 100%;
    padding: 18px;
    font-size: 18px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }

  .btn:hover {
    transform: translateY(-2px);
  }

  #status {
    margin-top: 20px;
  }

  .key-box {
    background: #000;
    color: #4ade80;
    padding: 15px;
    margin-top: 15px;
    border-radius: 8px;
    font-family: monospace;
  }
</style>

</head>

<body>

<div class="container">

  <h1>Meesho Auto Listing Pro</h1>
  <p>Automate your product uploads using AI</p>

  <div class="card">

```
<!-- 🔥 DYNAMIC PRICE -->
<div class="price" id="price">Loading...</div>

<button class="btn" onclick="startPayment()">
  🚀 Unlock Full Access
</button>

<div id="status"></div>
```

  </div>

</div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

let currentPrice = 0;

// ================= LOAD PRICE FROM SUPABASE =================
async function loadPrice(){
  try {
    const res = await fetch(API + "/pricing"); // 👈 your public route
    const data = await res.json();

    const pricing = data.pricing?.[0];

    if(pricing){
      currentPrice = pricing.price;
      document.getElementById("price").innerText =
        "₹" + pricing.price + " / " + pricing.days + " days";
    } else {
      document.getElementById("price").innerText = "Price unavailable";
    }

  } catch(e){
    document.getElementById("price").innerText = "Error loading price";
  }
}

loadPrice();


// ================= PAYMENT =================
async function startPayment(){
  const res = await fetch(API + "/create-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ plan: "pro" })
  });

  const data = await res.json();

  localStorage.setItem("order_id", data.order.id);

  const rzp = new Razorpay({
    key: "rzp_live_YOUR_KEY",
    amount: data.order.amount,
    order_id: data.order.id,
    name: "Meesho AI Tool",
    description: "Pro License"
  });

  rzp.open();

  document.getElementById("status").innerHTML = "⏳ Waiting for payment...";
  checkKeyLoop();
}


// ================= KEY FETCH =================
async function checkKeyLoop(){
  const orderId = localStorage.getItem("order_id");
  if(!orderId) return;

  const interval = setInterval(async ()=>{
    const res = await fetch(API + "/get-key-by-order/" + orderId);
    const data = await res.json();

    if(data.success){
      clearInterval(interval);

      document.getElementById("status").innerHTML = `
        <h3>✅ Payment Successful</h3>
        <div class="key-box">${data.key}</div>
        <a href="${API}/extension.zip" target="_blank">
          Download Extension
        </a>
      `;
    }

  },3000);
}
</script>

</body>
</html>
