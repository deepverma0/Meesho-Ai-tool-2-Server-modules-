<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho AI Auto-Listing Tool</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 40px;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  background: #ff4791;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#success {
  display: none;
  margin-top: 20px;
}

.key-box {
  background: black;
  padding: 10px;
  margin-top: 10px;
  font-family: monospace;
  color: #4ade80;
}
</style>
</head>

<body>

<h1>Meesho AI Tool</h1>

<button onclick="startPayment()">BUY NOW</button>

<div id="success"></div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

async function loadPrice(){
  try {
    const res = await fetch(API + "/pricing");
    const data = await res.json();
    console.log("Price:", data);
  } catch(e){}
}
loadPrice();

async function checkKeyLoop(){
  const orderId = localStorage.getItem("order_id");
  if(!orderId) return;

  const interval = setInterval(async () => {
    try {
      const res = await fetch(API + "/get-key-by-order/" + orderId);
      const data = await res.json();

      console.log("Checking key:", data);

      if(data.success){
        clearInterval(interval);

        document.getElementById("success").innerHTML = `
          <h3>✅ Payment Successful</h3>
          <p>Your License Key:</p>
          <div class="key-box">${data.key}</div>
          <a href="${API}/extension.zip" target="_blank">Download Extension</a>
        `;
      }
    } catch(e){}
  }, 3000);
}

async function startPayment(){
  try{
    const res = await fetch(API + "/create-order", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ plan:"pro" })
    });

    const data = await res.json();

    // 🔥 IMPORTANT FIX
    localStorage.setItem("order_id", data.order.id);

    const options = {
      key: "rzp_live_SgWkxYOITLPdG7",
      amount: data.order.amount,
      currency: "INR",
      name: "Meesho AI Tool",
      order_id: data.order.id,
      handler: function () {
        console.log("Payment success (UPI may delay)");
      }
    };

    new Razorpay(options).open();

    // ✅ Loading UI
    document.getElementById("success").style.display = "block";
    document.getElementById("success").innerHTML = `
      <h3>⏳ Processing Payment...</h3>
      <p>Please complete payment and wait here.</p>
    `;

    // ✅ Start checking for key
    checkKeyLoop();

  }catch(e){
    alert("Server error. Try again.");
  }
}
</script>

</body>
</html>
