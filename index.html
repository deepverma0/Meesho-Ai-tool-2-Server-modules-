<!DOCTYPE html>
<html>
<head>
  <title>Meesho AI Tool</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;padding:80px;font-family:sans-serif;">

<h1>🚀 Meesho AI Automation Tool</h1>
<p>Auto-generate listings, save hours, scale faster.</p>

<h2>🔥 PRO PLAN - ₹999 / 30 Days</h2>

<button onclick="startPayment()" style="padding:15px 30px;font-size:18px;background:#00ffa3;border:none;border-radius:8px;cursor:pointer;">
  💳 Buy License
</button>

<h3 id="status" style="margin-top:20px;"></h3>

<div id="result"></div>

<script>
const API = "https://grateful-wonder-production-20e4.up.railway.app";

async function startPayment() {
  try {
    document.getElementById("status").innerText = "Creating order...";

    const res = await fetch(API + "/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ plan: "pro" })
    });

    const data = await res.json();
    const order = data.order;

    const options = {
      key: "rzp_test_SgARnEVtkbjdvv",
      amount: order.amount,
      currency: "INR",
      order_id: order.id,

      handler: async function (response) {
        document.getElementById("status").innerText = "Verifying payment...";

        const verify = await fetch(API + "/verify-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ...response,
            plan: "pro"
          })
        });

        const result = await verify.json();

        if (result.success) {
          document.getElementById("result").innerHTML = `
            <h2>✅ Payment Successful</h2>
            <p>Your License Key:</p>
            <h1 style="color:#00ffa3">${result.key}</h1>

            <a href="https://your-extension-download-link.com" target="_blank">
              <button style="padding:12px 20px;margin-top:20px;font-size:16px;">
                ⬇ Download Extension
              </button>
            </a>
          `;
        } else {
          document.getElementById("status").innerText = "❌ Verification failed";
        }
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch (e) {
    document.getElementById("status").innerText = "Error: " + e.message;
  }
}
</script>

</body>
</html>
